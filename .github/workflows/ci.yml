name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: cargo build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets
      - run: cargo test

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings

  nix:
    name: nix flake check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Need a real ref + write token so the auto-bump step can
          # push the refreshed cargoHash back to the default branch.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/flake.lock', '**/Cargo.lock', '**/go.sum') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
          gc-max-store-size-linux: 5G

      # Inline sync-flake: rewrite flake.nix's cargoHash to match the
      # current Cargo.lock. On default-branch pushes the result is
      # auto-committed; on PRs we fail if it would change anything, so
      # reviewers see the drift instead of CI silently masking it.
      - name: sync flake.nix cargoHash
        run: |
          set -euo pipefail
          LOCK_HASH=$(sha256sum Cargo.lock | awk '{print $1}')
          SENTINEL="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          sed -i -E 's|^(\s*cargoHash = )"sha256-[^"]*";|\1"'"$SENTINEL"'";|' flake.nix
          set +e
          OUT=$(nix build .#pty-mcp --no-link 2>&1)
          BUILD_STATUS=$?
          set -e
          NEW_HASH=$(printf '%s\n' "$OUT" | awk '/got:[[:space:]]*sha256-/ {print $2; exit}')
          if [ -z "$NEW_HASH" ]; then
            if [ "$BUILD_STATUS" = "0" ]; then
              echo "::error::sync-flake: nix build unexpectedly succeeded with sentinel hash"
              echo "$OUT"
              exit 1
            fi
            echo "$OUT"
            echo "::error::sync-flake: nix build did not print 'got: sha256-…'"
            exit 1
          fi
          sed -i -E 's|^(\s*cargoHash = )"sha256-[^"]*";|\1"'"$NEW_HASH"'";|' flake.nix
          sed -i -E 's|^(\s*# cargo-lock:).*|\1 '"$LOCK_HASH"'|' flake.nix
          echo "sync-flake: cargoHash=$NEW_HASH cargo-lock=$LOCK_HASH"

      - name: assert flake.nix in sync (PR)
        if: github.event_name == 'pull_request'
        run: |
          if [ -n "$(git status --porcelain flake.nix)" ]; then
            echo "::error::flake.nix cargoHash is out of sync with Cargo.lock. Run 'just sync-flake' locally and commit the result."
            git --no-pager diff flake.nix
            exit 1
          fi

      - name: auto-commit flake.nix bump (default branch)
        if: github.event_name == 'push'
        run: |
          if [ -z "$(git status --porcelain flake.nix)" ]; then
            echo "flake.nix already in sync; nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add flake.nix
          git commit -m 'chore: auto-bump flake.nix cargoHash [skip ci]'
          git push origin HEAD:${{ github.ref_name }}

      - run: nix flake check --print-build-logs

      # Push the built package closure to the self-hosted xilo cache on
      # default-branch pushes. Best-effort: a cache-push failure must not
      # redden CI.
      - name: setup xilo
        if: github.event_name == 'push'
        uses: stubbedev/xilo@v1
        with:
          url: https://nix.stubbe.dev
          cache: default
          token: ${{ secrets.XILO_TOKEN }}

      - name: push nix build to xilo
        if: github.event_name == 'push'
        continue-on-error: true
        run: |
          OUT=$(nix build .#pty-mcp --no-link --print-out-paths)
          xilo push default $OUT
